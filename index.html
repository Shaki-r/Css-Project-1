<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projet</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav class="nav-bar">
      <img class="first-image" src="./logo.png" alt="logo" />
      <div class="links">
        <a href="#">Home</a>
        <a href="#">Home Tere Works</a>
        <a href="#">Tere Benifits</a>
        <button class="btn1">Help Center</button>
      </div>
    </nav>
    <div class="hero-section">
      <section class="sec-1">
        <h1 class="first-head">DOWNLOAD APP, SAVE MONEY, MAKE FRIENDS!</h1>
        <p class="first-para">
          Its simple and its free. Play your part in reducing Carbon Footprint
          and help Mother Nature to sustain its beauty. So what are you waiting
          for ? Lets ride together
        </p>
        <div class="buttons">
          <button class="btn2 btn"><i class="fa-brands fa-google-play" style="width: 30px;height: 29;"></i>DOWNLOAD</button>
          <button class="btn2 btn"><i class="fa-brands fa-app-store" style="color: white;width: 30px;height: 29;"></i>DOWNLOAD</button>
        </div>
      </section>
      <section class="sec-2">
        <img class="sec-image" src="./image.png" alt="image" />
      </section>
    </div>
    <section class="green-section">
      <p>Let's go. Get a link to download the app.</p>
      <input
        type="text"
        class="input"
        placeholder="Enter mobile phone number"
      />
      <button class="apply">APPLY TO DRIVE</button>
    </section>
  </body>
</html>
